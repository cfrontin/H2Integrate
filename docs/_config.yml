# Book settings
# Learn more at https://jupyterbook.org/customize/config.html
title: H2Integrate
author: National Renewable Energy Laboratory
# logo: logo.png
copyright: '2025'
only_build_toc_files: false
# exclude_patterns: [_build, Thumbs.db, .DS_Store, "**.ipynb_checkpoints", .github]
# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute: null
  # "cache" uses jupyter-cache to skip re-executing notebooks and MyST cells
  # whose source/kernel hasn't changed, so local rebuilds are fast when only
  # prose or unrelated Python has changed. Pass --clean to build_book.sh (or
  # delete docs/_build) to force a full re-execution.
  execute_notebooks: cache
  timeout: -1  # better for longer running notebooks
  merge_streams: true  # keeps unsynchronized cell outputs in a single output cell
  exclude_patterns:
    - _build
    - Thumbs.db
    - DS_Store
    - '**.ipynb_checkpoints'
# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex
# Information about where the book exists on the web
repository:
  url: https://github.com/NatLabRockies/H2Integrate
  path_to_book: docs
  branch: main
# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  baseurl: https://nrel.github.io/H2Integrate/
sphinx:
  extra_extensions:
    - sphinx.ext.autodoc
    - sphinx.ext.autosummary
    - sphinx.ext.napoleon
  config:
    language: python
    autosummary_generate: true
    autodoc_default_options:
      members: true
      member-order: bysource
      undoc-members: true
      private-members: true
      # special-members: true
      # inherited-members
      # show-inheritance
      # ignore-module-all
      # imported-members: true
      # exclude-members
      # class-doc-from
      # no-value
    autodoc_typehints: description
    html_static_path:
      - _static
    napoleon_use_admonition_for_notes: true
    napoleon_use_rtype: false
    nb_merge_streams: true
    nb_execution_raise_on_error: true
